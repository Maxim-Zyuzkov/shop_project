{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 animate-on-scroll">
        <div class="card shadow-sm p-4">
            <h2 class="text-center mb-4"><i class="fas fa-user-plus"></i> Регистрация</h2>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">Имя пользователя *</label>
                    <input type="text" name="username" class="form-control" placeholder="Введите логин" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Полное имя *</label>
                    <input type="text" name="full_name" class="form-control" placeholder="Иванов Иван Иванович" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Телефон</label>
                    <input type="text" name="phone" class="form-control" placeholder="+375 (29) XXX-XX-XX">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Город доставки</label>
                    <input type="text" name="city" class="form-control" placeholder="Минск">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Пароль *</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mt-3">
                    <i class="fas fa-check-circle"></i> Зарегистрироваться
                </button>
            </form>
            
            <p class="text-center mt-3">
                Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
